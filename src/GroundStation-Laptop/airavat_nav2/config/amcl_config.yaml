amcl:
  ros__parameters:
    scan_topic: /lidar/scan
    map_topic: /map

    base_frame_id: base_footprint
    odom_frame_id: odom
    global_frame_id: map

    set_initial_pose: false
    transform_tolerance: 1.0

    min_particles: 500
    max_particles: 2000

    update_min_d: 0.15
    update_min_a: 0.1
    resample_interval: 1

    laser_model_type: likelihood_field
    laser_max_range: 5.0
    laser_min_range: -1.0
    max_beams: 60

    robot_model_type: nav2_amcl::DifferentialMotionModel

    alpha1: 0.05
    alpha2: 0.05
    alpha3: 0.05
    alpha4: 0.05
    alpha5: 0.0

    z_hit: 0.6
    z_rand: 0.4
    sigma_hit: 0.2
    laser_likelihood_max_dist: 2.0

    recovery_alpha_fast: 0.1
    recovery_alpha_slow: 0.001

    tf_broadcast: true
    use_sim_time: false
